name: ⚡ Deploy Edge Functions

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/**'
    branches:
      - main

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    name: 🚀 Deploy Edge Functions to Supabase
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Supabase CLI
        run: npm install -g supabase
      
      - name: Verify Edge Function exists
        run: |
          if [ ! -f "supabase/functions/telemetry/index.ts" ]; then
            echo "❌ telemetry function not found!"
            exit 1
          fi
          echo "✅ telemetry function validated"
      
      - name: Deploy telemetry function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "⚡ Deploying Edge Functions..."
          supabase functions deploy telemetry \
            --project-id=$SUPABASE_PROJECT_ID || {
            echo "⚠️ Deploy failed (optional step)"
            exit 0
          }
      
      - name: Summary
        run: |
          echo "### ⚡ Edge Functions Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Functions Deployed:**" >> $GITHUB_STEP_SUMMARY
          echo "- telemetry (logs system events)" >> $GITHUB_STEP_SUMMARY

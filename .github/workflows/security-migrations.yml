name: security-migrations

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  postgres-security-migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
        timeout-minutes: 10

      - name: Test connection
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql -h aws-0-eu-west-1.pooler.supabase.com \
               -p 5432 \
               -U postgres.qpoooqpcjmbwkzjeyczxs \
               -d postgres \
               -c "SELECT version();"
        timeout-minutes: 5

      - name: Run security migrations
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql -h aws-0-eu-west-1.pooler.supabase.com \
               -p 5432 \
               -U postgres.qpoooqpcjmbwkzjeyczxs \
               -d postgres \
               -f ./migrations/security-migrations.sql
        timeout-minutes: 5

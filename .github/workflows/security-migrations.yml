## ✅ FIX #1: Verify & Update GitHub Secret

### Step 1a: Get Current Supabase DB Password
1. Go to **Supabase Dashboard** → Your Project
2. Navigate to **Settings** → **Database**
3. Scroll to **Connection String** section
4. Copy the password from the connection string OR reset it if needed
5. **Important:** The password field shows masked characters — click **"Reveal"** if available

### Step 1b: Update GitHub Secret
1. Go to GitHub repo → **Settings** → **Secrets and variables** → **Actions**
2. Find `SUPABASE_DB_PASSWORD` (or create if missing)
3. **Delete the old secret** and create a new one with the correct password
4. Paste the **exact** password (no spaces, special chars as-is)

### Step 1c: Test Connection String Format
Your connection string should look like:
```
postgresql://postgres.qpoooqpcjmbwkzjeyczxs:<PASSWORD>@aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
```

**Never store the full connection string in GitHub Secrets.** Instead:
- Store only `SUPABASE_DB_PASSWORD` as a secret
- Store host, user, port, database as non-secret GitHub Variables (or hardcode in workflow)


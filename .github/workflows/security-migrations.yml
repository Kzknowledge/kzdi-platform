## 🚨 CRITICAL: Workflow Secrets Best Practice

**NEVER** store passwords directly in workflow files. Instead:

```yaml
# ✅ CORRECT
env:
  DB_HOST: aws-0-eu-west-1.pooler.supabase.com
  DB_USER: postgres.qpoooqpcjmbwkzjeyczxs
  PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

# ❌ WRONG
env:
  DATABASE_URL: "postgresql://user:password@host:5432/db"  # Hardcoded!
```


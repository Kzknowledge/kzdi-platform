## ✅ FIX #2: Update `security-migrations.yml` Workflow

### Problem: PostgreSQL Client Installation Hangs
**Fix:** Add explicit package manager cache update and timeout handling

```yaml
name: security-migrations

on:
  push:
    branches:
      - main
      - develop

jobs:
  postgres-migration:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      # FIX: Update package manager cache FIRST
      - name: Update package manager
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
        timeout-minutes: 10
      
      # FIX: Build connection string dynamically
      - name: Set up Supabase connection
        run: |
          PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} \
          psql -h aws-0-eu-west-1.pooler.supabase.com \
               -p 5432 \
               -U postgres.qpoooqpcjmbwkzjeyczxs \
               -d postgres \
               -c "SELECT version();"
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        timeout-minutes: 5
      
      # FIX: Run migrations with explicit error handling
      - name: Run security migrations
        run: |
          PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} \
          psql -h aws-0-eu-west-1.pooler.supabase.com \
               -p 5432 \
               -U postgres.qpoooqpcjmbwkzjeyczxs \
               -d postgres \
               -f ./migrations/security-migrations.sql
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        timeout-minutes: 5
      
      # FIX: Add workflow summary on success/failure
      - name: Workflow summary
        if: always()
        run: echo "Migration workflow completed with status: ${{ job.status }}"
```

### Why This Works
- **`sudo apt-get update`** refreshes package cache before install
- **`timeout-minutes`** prevents indefinite hangs
- **`PGPASSWORD` env var** passes password securely
- **`psql` test command** validates connection before running migrations
- **Explicit error handling** surfaces failures clearly


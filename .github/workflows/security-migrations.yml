## PART A: GitHub Actions CI/CD Failure (`security-migrations.yml`)

### Problem Summary
- **Workflow:** `security-migrations.yml`
- **Repo:** `kzdi-platform`
- **Error:** ENOTFOUND / auth failure on Supabase session pooler connection
- **Session Pooler Details:**
  - Host: `aws-0-eu-west-1.pooler.supabase.com`
  - Port: `5432` (PostgreSQL)
  - User: `postgres.qpoooqpcjmbwkzjeyczxs`
  - Database: `postgres`

### Root Cause Analysis

#### 1. **GitHub Secret Mismatch** (Most Likely)
The `SUPABASE_DB_PASSWORD` secret stored in GitHub does **not match** the actual Supabase database password. This causes:
- Authentication failure at connection time
- ENOTFOUND if DNS resolution works but auth fails
- Immediate connection drop

#### 2. **Session Pooler Configuration Issues**
- Incorrect connection string format
- Missing connection parameters
- Pooler timeout settings too aggressive

#### 3. **PostgreSQL Client Not Installed**
The workflow may hang on `apt-get install postgresql-client` if:
- Package manager cache is stale
- Network timeout during install
- Missing `update` step


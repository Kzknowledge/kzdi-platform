## PART B: Telemetry Function 500 Error

### Problem Summary
- **Table:** `telemetry.telemetry_events`
- **Error:** INSERT operation failing with 500 error
- **Root Cause:** RLS policy or permission issue, OR table schema mismatch

### ✅ FIX #3: Verify RLS Policy & Service Role Permissions

```sql
-- Step 1: Check if RLS is enabled on telemetry_events
SELECT schemaname, tablename, rowsecurity
FROM pg_tables
WHERE schemaname = 'telemetry' AND tablename = 'telemetry_events';

-- Expected output: rowsecurity = true

-- Step 2: List all RLS policies on the table
SELECT schemaname, tablename, policyname, permissive, roles, qual, with_check
FROM pg_policies
WHERE schemaname = 'telemetry' AND tablename = 'telemetry_events';

-- Expected output: At least one INSERT policy with role 'service_role'

-- Step 3: Check service_role permissions
SELECT grantee, privilege_type
FROM role_table_grants
WHERE table_name = 'telemetry_events' AND table_schema = 'telemetry';

-- Expected output: service_role has INSERT, UPDATE, SELECT, DELETE

-- Step 4: Verify the policy explicitly allows INSERT
SELECT * FROM pg_policies
WHERE schemaname = 'telemetry'
  AND tablename = 'telemetry_events'
  AND policyname = 'Enable insert for service_role';
```

### ✅ FIX #4: Recreate RLS Policy if Needed

If the policy is missing or malformed, run:

```sql
-- Drop old policy if it exists (CAREFUL!)
DROP POLICY IF EXISTS "Enable insert for service_role" 
  ON telemetry.telemetry_events;

-- Create new policy allowing service_role to INSERT
CREATE POLICY "Enable insert for service_role"
  ON telemetry.telemetry_events
  FOR INSERT
  WITH CHECK (true)
  TO service_role;

-- Grant explicit permissions
GRANT USAGE ON SCHEMA telemetry TO service_role;
GRANT INSERT, UPDATE, SELECT, DELETE ON telemetry.telemetry_events TO service_role;
GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA telemetry TO service_role;
```

---

## ✅ FIX #5: Verify Table Schema & Column Types

```sql
-- Check table structure
SELECT column_name, data_type, is_nullable
FROM information_schema.columns
WHERE table_schema = 'telemetry' AND table_name = 'telemetry_events'
ORDER BY ordinal_position;

-- Verify primary key and constraints
SELECT constraint_name, constraint_type
FROM information_schema.table_constraints
WHERE table_schema = 'telemetry' AND table_name = 'telemetry_events';
```

**Common Causes of INSERT 500 Error:**
1. Missing DEFAULT for `id` column (if serial/auto-increment)
2. NOT NULL constraint on a column you're not providing
3. Foreign key constraint violation
4. Trigger error (check trigger logs)
5. RLS policy denying INSERT for service_role


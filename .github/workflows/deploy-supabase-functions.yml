# // KZDI Telemetry Core: Automated Production Deployment Engine
name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Contents
        uses: actions/checkout@v4

      - name: Install Supabase Core CLI Environment
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Isolated Telemetry Engine Function
        run: |
          supabase functions deploy telemetry --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

